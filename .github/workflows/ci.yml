name: CI
on:
  workflow_call:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: greenticai/.github/.github/workflows/host-crate-ci.yml@main

  publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [ci]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
      - name: Read version from Cargo.toml
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="$(awk -F '"' '/^version = "/ { print $2; exit }' Cargo.toml)"
          if [ -z "$version" ]; then
            echo "Failed to extract crate version from Cargo.toml" >&2
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Publish crates.io packages
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          crates="$(bash ci/list_publishable_crates.sh)"
          if [ -z "$crates" ]; then
            echo "No publishable crates found."
            exit 0
          fi

          retry_publish() {
            crate="$1"
            attempt=1
            max_attempts=3
            while [ "$attempt" -le "$max_attempts" ]; do
              if cargo publish -p "$crate" --locked; then
                return 0
              fi
              if [ "$attempt" -eq "$max_attempts" ]; then
                echo "cargo publish failed for '$crate' after ${max_attempts} attempts" >&2
                return 1
              fi
              sleep_seconds=$((attempt * 20))
              echo "Retry ${attempt}/${max_attempts} for '$crate' after ${sleep_seconds}s"
              sleep "$sleep_seconds"
              attempt=$((attempt + 1))
            done
          }

          for crate in $crates; do
            echo "::group::${crate} dry-run"
            cargo package --no-verify -p "$crate"
            cargo package -p "$crate"
            cargo publish -p "$crate" --dry-run
            bash ci/check_package_assets.sh "$crate"
            echo "::endgroup::"
          done

          for crate in $crates; do
            echo "::group::${crate} publish"
            retry_publish "$crate"
            echo "::endgroup::"
            sleep 15
          done

      - name: Install ORAS
        uses: oras-project/setup-oras@v1
      - name: Login to GHCR
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN || github.token }}
        run: echo "${GHCR_TOKEN}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Publish .gtpack files as OCI artifacts
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          owner_lc="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          repo_name="$(basename "${GITHUB_REPOSITORY}")"

          count=0
          while IFS= read -r -d '' file; do
            count=$((count + 1))
            base="$(basename "$file" .gtpack)"
            artifact_name="$(printf '%s' "$base" | tr '[:upper:]' '[:lower:]' | tr -cs 'a-z0-9._-' '-')"
            ref="ghcr.io/${owner_lc}/${repo_name}/${artifact_name}:v${version}"
            echo "Publishing ${file} -> ${ref}"
            oras push "$ref" \
              "$file:application/vnd.greentic.gtpack.v1+binary"
          done < <(find . -type f -name '*.gtpack' -print0)

          if [ "$count" -eq 0 ]; then
            echo "No .gtpack files found; skipping GHCR publish."
          fi
